env:
    credentials: "ENCRYPTED[3f12dbbb720db8c15c12ea4b21c2dc133ef43917064e35992224d2f697aa8474163b2a2954ea0c60cdd02dcfd255f6fe]"
    rcloneconfig_b64: "ENCRYPTED[59e7f7c9304e81fd6e8435026afc30881d8d823ea361f1ec5e3b0fb0a142d2780eae2089413c6ac35253505c92705c01]"
    tokentl: "ENCRYPTED[1d093ac4c2a9b51d77323ab714a27bfa6cd62f49101e702287ea9c6a49f5b14e056ad28ff8ef9da9eb907420b40da245]"
    idtl: "ENCRYPTED[55f64c7f5099cd93f442d6f93dd9f8a34bf29961c0bec5be10580ece33bfe81faf74502094ef81c04c6c6439fa73c99b]"
    lunch: lunch conquer_whyred-user
    make: make carthage

task:
  name: "Setting Up, Syncing, Building and Uploading..."
  timeout_in: 115m
  container:
      image: memedo/paiskomom:knjt
      cpu: 8
      memory: 32G

  Build-Env-Setup_background_script:
       - export DEBIAN_FRONTEND=noninteractive
       - mkdir -p ~/.config/rclone
       - echo "$rcloneconfig_b64" | base64 -d > ~/.config/rclone/rclone.conf
       - git config --global user.name "paiskomom"
       - git config --global user.email "midooneteam@gmail.com"
       - echo "$credentials" > ~/.git-credentials
       - git config --global credential.helper store --file=~/.git-credentials
       - mkdir -p ~/ccache
       - rclone copy komom:conquer/ccache.tar.gz ~/ -P
       - cd ~/
       - time tar xf ccache.tar.gz
       - cd ~/

  Storage-Checker_background_script:
      - df -h
      - lsblk
      - ls -l -a -h
      - ./w.sh

  Sync_script:
      - curl -s https://api.telegram.org/bot$tokentl/sendMessage -d chat_id=$idtl -d text="🔄 Start sync Source. . ."
      - mkdir -p ~/rom
      - cd ~/rom
      - sudo curl --create-dirs -L -o /usr/local/bin/repoo -O -L https://storage.googleapis.com/git-repo-downloads/repo
      - sudo chmod a+rx /usr/local/bin/repoo
      - repo init -q --no-repo-verify --depth=1 -u https://github.com/paiskomom/manifest -b eleven
      - git clone --depth 1 https://github.com/paiskomom/local_manifest.git -b conquer-11 .repo/local_manifests
      - sudo apt-get update && sudo apt-get install -y git-lfs && git lfs install
      - rm -rf .repo/repo && git clone https://gerrit.googlesource.com/git-repo .repo/repo
      - repo sync -c --no-clone-bundle --no-tags --optimized-fetch --prune --force-sync -j8
      - repo forall -c 'git lfs install && git lfs pull && git lfs checkout'
      - curl -s https://api.telegram.org/bot$tokentl/sendMessage -d chat_id=$idtl -d text="✅ Sync Completed!"
      - rm -rf vendor/conquer/build/tools/roomservice.py

  Build_script:
      - export BUILD_USERNAME="haikaru17"
      - export BUILD_USER="haikaru17"
      - export BUILD_HOSTNAME="ubuntu"
      - export BUILD_HOST="ubuntu"
      - sudo ln -sf /usr/share/zoneinfo/Asia/Jakarta /etc/localtime
      - curl -s https://api.telegram.org/bot$tokentl/sendMessage -d chat_id=$idtl -d text="🛠️ Boeild conquer Started! https://cirrus-ci.com/build/$CIRRUS_BUILD_ID"
      - ./collect.sh
      - curl -s https://api.telegram.org/bot$tokentl/sendMessage -d chat_id=$idtl -d text="⏳ Build script selesai. Lanjut ke proses upload ccache atau zip ROM."

  Upload_script:
      - if ls ~/rom/out/target/product/whyred/conquer*.zip 1> /dev/null 2>&1; then ./upload.sh; curl -s https://api.telegram.org/bot$tokentl/sendMessage -d chat_id=$idtl -d text="✅ Boeild Completed & Uploaded!"; else echo "Zip belum terbentuk, lanjut upload ccache..."; fi
      - curl -s https://api.telegram.org/bot$tokentl/sendMessage -d chat_id=$idtl -d text="📮 Compressing ccache...."
      - ./ziping.sh
      - cd ~/
      - curl -s https://api.telegram.org/bot$tokentl/sendMessage -d chat_id=$idtl -d text="📤 Uploading ccache...."
      - rclone copy ccache.tar.gz komom:conquer -P
      - curl -s https://api.telegram.org/bot$tokentl/sendMessage -d chat_id=$idtl -d text="✅ ccache Uploaded Successfully!"
